<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Task List</title>
</head>

<body>
    <h1>タスク一覧</h1>
    <ul>
        <li th:each="task : ${tasks}">
            Id: <span th:text="${task.id}"></span>
            / Title: <span th:text="${task.title}"></span>
            <span th:if="${task.id == 1}">
                特別なタスク
            </span>
        </li>
    </ul>
</body>

</html>
